apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-for-pod-override
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: storageclass-wekafs-fs-api
  volumeMode: Filesystem
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-other-data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: storageclass-wekafs-fs-api
  volumeMode: Filesystem
  resources:
    requests:
      storage: 1Gi

---
kind: Pod
apiVersion: v1
metadata:
  name: csi-app-pod-override
  # Pod annotation for mount option overrides
  # Format: <pvc-name-regex>: <mount-option-modifiers>
  # Mount option modifiers:
  #   + prefix: add the option (respecting mutually exclusive sets)
  #   - prefix: remove the option
  # Multiple patterns can be specified separated by semicolon or newline.
  # First matching pattern wins.
  annotations:
    weka.io/mount-options-overrides: |
      pvc-for-pod-override: -forcedirect, +readcache
      pvc-other-.*: +writecache
spec:
  # make sure that pod is scheduled only on node having weka CSI node running
  nodeSelector:
    topology.csi.weka.io/global: "true"
  containers:
    - name: my-frontend
      image: ubuntu
      volumeMounts:
      - mountPath: "/data"
        name: my-csi-volume
      - mountPath: "/other-data"
        name: my-csi-volume-other
      command: ["/bin/sh"]
      args: ["-c", "while true; do mount -t wekafs; sleep 30; done"]
  volumes:
    - name: my-csi-volume
      persistentVolumeClaim:
        claimName: pvc-for-pod-override
    - name: my-csi-volume-other
      persistentVolumeClaim:
        claimName: pvc-other-data
