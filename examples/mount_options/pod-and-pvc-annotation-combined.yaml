apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-with-base-overrides
  # PVC annotation adds base overrides that apply to all pods mounting it
  annotations:
    weka.io/mount-options-override: -forcedirect, +readcache
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: storageclass-wekafs-fs-api
  volumeMode: Filesystem
  resources:
    requests:
      storage: 1Gi

---
kind: Pod
apiVersion: v1
metadata:
  name: csi-app-combined-override-1
  # Pod annotation adds further per-PVC overrides
  # Pod annotations are applied AFTER PVC annotations
  # so they take precedence
  annotations:
    weka.io/mount-options-overrides: |
      pvc-with-base-overrides: +writecache, +noatime
spec:
  nodeSelector:
    topology.csi.weka.io/global: "true"
  containers:
    - name: my-frontend
      image: ubuntu
      volumeMounts:
      - mountPath: "/data"
        name: my-csi-volume
      command: ["/bin/sh"]
      args: ["-c", "while true; do mount -t wekafs; sleep 30; done"]
  volumes:
    - name: my-csi-volume
      persistentVolumeClaim:
        claimName: pvc-with-base-overrides

---
kind: Pod
apiVersion: v1
metadata:
  name: csi-app-combined-override-2
  # Different pod with different overrides for the same PVC
  annotations:
    weka.io/mount-options-overrides: |
      pvc-with-base-overrides: -readcache, +writecache
spec:
  nodeSelector:
    topology.csi.weka.io/global: "true"
  containers:
    - name: my-frontend
      image: ubuntu
      volumeMounts:
      - mountPath: "/data"
        name: my-csi-volume
      command: ["/bin/sh"]
      args: ["-c", "while true; do mount -t wekafs; sleep 30; done"]
  volumes:
    - name: my-csi-volume
      persistentVolumeClaim:
        claimName: pvc-with-base-overrides

